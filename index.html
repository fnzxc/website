<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多媒体工具箱</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f8fafc;
    color: #1f2937;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* 顶部 */
.header {
    text-align: center;
    padding: 100px 20px 80px;
    background: linear-gradient(135deg, #e0e7ff, #f1f5f9);
    border-radius: 20px;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 44px;
    margin-bottom: 15px;
}

.header p {
    color: #4b5563;
    font-size: 18px;
    margin-bottom: 30px;
}

.download-btn {
    display: inline-block;
    padding: 14px 34px;
    font-size: 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: #fff;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(79,70,229,0.3);
    transition: 0.25s;
}

.download-btn:hover {
    transform: translateY(-2px);
}

/* 卡片 */
.card {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 25px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.card h2 {
    margin-top: 0;
}

/* 功能 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.feature {
    background: #f9fafb;
    padding: 20px;
    border-radius: 12px;
}

.feature h3 {
    margin: 0 0 10px;
}

.feature p {
    margin: 0;
    color: #6b7280;
}

/* footer */
.footer {
    text-align: center;
    color: #9ca3af;
    margin: 50px 0 20px;
}
</style>

</head>

<body>

<div class="container">


<!-- 顶部 -->
<div class="header">
    <h1>多媒体工具箱</h1>
    <p>简单 · 高效 · 一站式多媒体处理工具</p>
    <a href="#" class="download-btn" onclick="alert('产品暂未上线'); return false;">立即下载</a>
</div>

<!-- 产品介绍 -->
<div class="card">
    <h2>产品介绍</h2>
    <p>
        一款轻量级多媒体工具，支持视频处理、音频提取、格式转换与图片压缩，
        满足日常处理需求。
    </p>
</div>

<!-- 功能 -->
<div class="card">
    <h2>核心功能</h2>

    <div class="grid">
        <div class="feature">
            <h3>视频处理</h3>
            <p>裁剪与基础编辑</p>
        </div>

        <div class="feature">
            <h3>音频提取</h3>
            <p>视频转音频</p>
        </div>

        <div class="feature">
            <h3>格式转换</h3>
            <p>多格式互转</p>
        </div>

        <div class="feature">
            <h3>图片压缩</h3>
            <p>优化体积</p>
        </div>

        <div class="feature">
            <h3>链接解析</h3>
            <p>支持部分资源解析</p>
        </div>
    </div>
</div>

<!-- 合规 -->
<div class="card">
    <h2>合规说明</h2>
    <p>本工具仅用于个人学习与多媒体处理，请合理使用相关功能。</p>
</div>

<div class="footer">
    © 2026 多媒体工具箱
</div>

</div>

</body>
</html>
